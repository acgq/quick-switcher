name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux-x86_64'
            os: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: '--bundles deb,rpm,appimage --target x86_64-unknown-linux-gnu'
          - platform: 'linux-aarch64'
            os: 'ubuntu-22.04'
            target: 'aarch64-unknown-linux-gnu'
            args: '--bundles deb,rpm,appimage --target aarch64-unknown-linux-gnu'
          - platform: 'windows-x86_64'
            os: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: '--bundles msi,nsis --target x86_64-pc-windows-msvc'
          - platform: 'windows-aarch64'
            os: 'windows-latest'
            target: 'aarch64-pc-windows-msvc'
            args: '--bundles msi,nsis --target aarch64-pc-windows-msvc'
          - platform: 'macos-x86_64'
            os: 'macos-13'
            target: 'x86_64-apple-darwin'
            args: '--bundles dmg --target x86_64-apple-darwin'
          - platform: 'macos-aarch64'
            os: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--bundles dmg --target aarch64-apple-darwin'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm install

      - name: Install Linux dependencies
        if: matrix.platform == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Linux ARM dependencies
        if: matrix.platform == 'linux-aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          sudo apt-get install -y libwebkit2gtk-4.1-dev:arm64 libgtk-3-dev:arm64 libayatana-appindicator3-dev:arm64 librsvg2-dev:arm64 || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Quick Switcher ${{ github.ref_name }}'
          releaseBody: 'See assets below for installation instructions.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}